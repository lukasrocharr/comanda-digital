# ── Aplicação ────────────────────────────────────────────────────────
spring.application.name=comanda-digital
server.port=8080

# ── Perfil ativo (trocar para 'prod' em produção) ────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── JPA ─────────────────────────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ── Jackson ─────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── JWT ─────────────────────────────────────────────────────────────
# Gere uma chave segura: openssl rand -hex 32
app.jwt.secret=3f5a8b2c1d7e9f0a4b6c8d2e5f7a1b3c4d6e8f0a2b4c6d8e0f2a4b6c8d0e2f4
app.jwt.expiration-ms=28800000
