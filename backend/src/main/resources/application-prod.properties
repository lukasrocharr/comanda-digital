# ── Banco de produção (Postgres recomendado) ───────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/comanda_digital?sslmode=disable}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

# ── DDL ─────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true

# ── JWT secret via variável de ambiente ───────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:${JWT_SECRET:}}
